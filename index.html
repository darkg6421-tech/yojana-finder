<!DOCTYPE html>
<html>
<head>
    <title>Yojana Finder India</title>
</head>
<body>

<h1>🇮🇳 Government Scheme Finder</h1>

<p>Enter your details:</p>

Age: <input type="number" id="age"><br><br>
Income: <input type="number" id="income"><br><br>
State: <input type="text" id="state"><br><br>

<button onclick="check()">Check</button>

<h2 id="result"></h2>

<script>
function check() {
    let age = document.getElementById("age").value;
    let income = document.getElementById("income").value;

    let output = "🔎 Based on your input:<br>";

    if(age >= 18 && income < 300000) {
        output += "✔ Scholarship Scheme<br>";
    }

    if(age >= 18 && income < 800000) {
        output += "✔ Education Loan Support<br>";
    }

    if(output === "🔎 Based on your input:<br>") {
        output += "❌ No schemes found<br>";
    }

    output += "<br>⚠ More schemes coming soon...";

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
